<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="channels4_profile.jpg" type="image/x-icon">
    <title>Formulário</title>
</head>
<style>
    fieldset{background-color: blueviolet;width: 300px;margin: auto;border-radius: 10px 10px;padding: 10px;}
    label{padding: 10px;border-radius: 10px 10px;font-size: 20px;color: white;display: flex;flex-direction: column;}
    input{text-align: left;color: black;font-size: 15px;font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;width: 200px;border-radius: 10px 10px;border: 3px solid red;margin: auto;}
    option{background-color: beige;color: red;}
    textarea{width: 300px;border: 4px solid blue;border-radius: 10px 10px;}
    button{border: 3px solid red;background-color: aqua;border-radius: 10px 10px;color: blue;}
    select{background-color: black;color: yellow;font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;font-size: 15px;}
    body{background: linear-gradient(to right,white,red,white);text-align: center;}
    h1{color: black;font-size: 30px;font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;font-style: oblique;}
    p{color: white;font-size: 15px;font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;font-style: inherit;}
    .color{background-color: rgb(0, 0, 0);width: 200px;border-radius: 10px 10px;margin: auto;box-shadow: 10px 10px 10px white;padding: 10px;}
    summary{width: 300px;margin: auto;border-radius: 10px 10px;}
</style>
<body>
    <div id="text"><details><summary style="background-color: aqua;box-shadow: 5px 5px 5px red;border-radius: 10px 10px;color: black;">Cadastro de <b style="color: red;">Brasileiros</b></summary>
        <br>
    <form>
        <fieldset>
        <header><h1><big>Cadastro de <b style="color: red;">Brasileiros</b></big></h1></header>
            <label for="Nome">Nome</label>
            <input type="text" name="Nome" id="Nome" required>
            <label for="Idade">Idade</label>
            <input type="number" name="Idade" id="Idade" required>
            <label for="CPF">CPF</label>
            <input type="number" name="CPF" id="CPF" required>
            <label for="RG">RG</label>
            <input type="number" name="RG" id="RG" required>
            <label for="Telefone">Telefone</label>
            <input type="number" id="Telefone" name="Telefone" required>
            <label for="Email">Email</label>
            <input type="email" name="Email" id="Email" required>
            <label for="Endereço">Endereço</label>
            <input type="text" name="Endereço" id="Endereço" required>
            <br>
            <label>Qual a sua <b style="color: red;">Experiência</b>?</label>
            <div class="color">
            <label for="Jovem"><b style="color: yellow;">Jovem</b></label>
            <input type="radio" value="Jovem" name="Experiência" required>
            <label for="Aprendiz"><b style="color: yellow;">Aprendiz</b></label>
            <input type="radio" value="Aprendiz" name="Experiência" required>
            <label for="Iniciante"><b style="color: yellow;">Iniciante</b></label>
            <input type="radio" value="Iniciante" name="Experiência" required>
            <label for="Veterano"><b style="color: yellow;">Veterano</b></label>
            <input type="radio" value="Veterano" name="Experiência" required>
            <label for="Hard"><b style="color: yellow;">Hard</b></label>
            <input type="radio" value="Hard" name="Experiência" required>
            <label for="Expert"><b style="color: yellow;">Expert</b></label>
            <input type="radio" value="Expert" name="Experiência" required>
            <label for="Master"><b style="color: yellow;">Master</b></label>
            <input type="radio" value="Master" name="Experiência" required>
            </div>
            <br>
            <label>Qual o seu <b style="color: red;">Signo</b>?</label>
            <br>
            <select required>
                <option value="" selected disabled>Selecione</option>
                <option value="Gêmeos">Gêmeos</option>
                <option value="Libra">Libra</option>
                <option value="Cancer">Cancer</option>
                <option value="Aquario">Aquario</option>
                <option value="Leão">Leão</option>
                <option value="Sagitario">Sagitario</option>
                <option value="Escorpião">Escorpião</option>
                <option value="Capricornio">Capricornio</option>
                <option value="Virgem">Virgem</option>
                <option value="Touro">Touro</option>
                <option value="Câncer">Câncer</option>
                <option value="Áries">Áries</option>
                <option value="Peixes">Peixes</option>
                <option value="Sagitário">Sagitário</option>
            </select>
            <br>
            <label>Fale sobre sua <b style="color: red;">Experiência</b></label>
            <br>
            <textarea name="Experiência" id="Experiência" rows="6"></textarea>
            <br>
            <button>Confirme</button>
        </fieldset>
        <p>Retorne para minha <a href="index.html" target="_blank" rel="external" style="background-color: aqua;color: red;border-radius: 10px 10px;">1ªPágina</a></p>
    </form>
    </details></div>
</body>
</html>
